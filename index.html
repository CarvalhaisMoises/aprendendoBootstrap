<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORMULARIO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid justify-content-center">
            <span class="navbar-brand mb-0 h1">Prontuário Eletrônico</span>
        </div>
    </nav>

        <form onsubmit="mostrarDados(); return false">
    <div class="container mt-4">

        <!-- Dados do Paciente -->
        <div class="card mb-4">
            <div class="card-header bg-info text-white text-center">
                Dados do Paciente
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Nome</label>
                        <input type="text" id="nome" name="nome" class="form-control">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label>Idade</label>
                        <input type="number" id="idade" name="idade" class="form-control">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label>Sexo</label>
                        <select id="sexo" name="sexo" class="form-select">
                            <option>Masculino</option>
                            <option>Feminino</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sinais Vitais -->
        <div class="card mb-4">
            <div class="card-header bg-info text-white text-center">
                Sinais Vitais
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-3 mb-3">
                        <label>Pressão</label>
                        <input type="text" id="pressao" name="pressao" placeholder="Ex: 120/80
                        " class="form-control">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label>Temperatura</label>
                        <input type="text" id="temperatura" name="temperatura" placeholder="Ex:26.5" class="form-control">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label>Frequência Cardíaca</label>
                        <input type="text" id="frequencia" name="frequencia" class="form-control">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label>Respiração</label>
                        <input type="text" id="respiracao" name="respiracao" class="form-control">
                    </div>
                </div>
            </div>
        </div>

        <!-- Evolução -->
        <div class="card mb-4">
            <div class="card-header bg-info text-white text-center">
                Evolução do Paciente
            </div>
            <div class="card-body">
                <label> Descreva a evolução</label>
                <textarea id="evolucao" name="evolucao" class="form-control" rows="4"></textarea>
            </div>
        </div>

        <!-- Medicação -->
        <div class="card mb-4">
            <div class="card-header bg-info text-white text-center">
                Medicação
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label>Medicamento</label>
                    <input type="text" id="medicamento" name="medicamento" class="form-control">
                </div>
                <div class="mb-3">
                    <label>Dosagem</label>
                    <input type="text" id="dosagem" name="dosagem" class="form-control">
                </div>
                <div class="mb-3">
                    <label>Horário</label>
                    <input type="time" id="horario" name="horario" class="form-control">
                </div>
            </div>
        </div>
        <!--resultado-->
<div id="resultado" class="alert alert-secondary mt-4 d-none"></div>
        <!-- Botão -->
        <div class="text-end mb-5">
            <button class="btn btn-primary" type="submit">
                Salvar Prontuário
            </button>
        </div>

        </div>

    </div>
</form>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.JS"></script>
<script src="script.js"></script>
</body>

</html>
