<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORMULARIO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid justify-content-center">
            <span class="navbar-brand mb-0 h1">
                <i class="bi bi-hospital"></i>Prontuário Eletrônico</span>
        </div>
    </nav>

    <form onsubmit="mostrarDados(); return false">
        <div class="container mt-4">

            <!-- Dados do Paciente -->
            <div class="card mb-4 shadow-sm rounded-4">
                <div class="card-header bg-primary text-white text-center fw-bold">
                    <i class="bi bi-person"></i> Dados do Paciente
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Nome</label>
                            <input type="text" id="nome" name="nome" class="form-control">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label>Idade</label>
                            <input type="number" id="idade" name="idade" class="form-control">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label>Sexo</label>
                            <select id="sexo" name="sexo" class="form-select">
                                <option>Masculino</option>
                                <option>Feminino</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sinais Vitais -->
            <div class="card mb-4 shadow-sm rounded-4">
                <div class="card-header bg-danger text-white text-center fw-bold">
                    <i class="bi bi-heart-pulse"></i> Sinais Vitais
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-3 mb-3">
                            <label>Pressão</label>
                            <input type="text" id="pressao" name="pressao" placeholder="Ex: 120/80
                        " class="form-control">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label>Temperatura</label>
                            <input type="text" id="temperatura" name="temperatura" placeholder="Ex:26.5"
                                class="form-control">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label>Frequência Cardíaca</label>
                            <input type="text" id="frequencia" name="frequencia" class="form-control">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label>Saturação</label>
                            <input type="text" id="saturacao" name="saturacao" class="form-control">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Evolução -->
            <div class="card mb-4 shadow-sm rounded-4">
                <div class="card-header bg-warning text-white text-center fw-bold">
                    <i class="bi bi-journal-text"></i>Evolução do Paciente
                </div>
                <div class="card-body rounded-4">
                    <label> Descreva a evolução</label>
                    <textarea id="evolucao" name="evolucao" class="form-control" rows="4"></textarea>
                </div>
            </div>

            <!-- Medicação -->
            <div class="card mb-4 shadow-sm rounded-4">
                <div class="card-header bg-success text-white text-center fw-bold">
                    <i class="bi bi-capsule"></i> Medicação
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label>Medicamento</label>
                        <input type="text" id="medicamento" name="medicamento" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label>Dosagem</label>
                        <input type="text" id="dosagem" name="dosagem" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label>Horário</label>
                        <input type="time" id="horario" name="horario" class="form-control">
                    </div>
                </div>
            </div>
            <!-- Botão -->
            <div class="text-end mb-5">
                <button class="btn btn-success btn-lg shadow">
                    <i class="bi bi-save"></i> Salvar Prontuário
                </button>
            </div>

                <!--resultado-->
                <div id="resultado" class="card shadow d-none">
                    <div class="card-header bg-dark text-white">
                        Resultado do Prontuário
                    </div>
                    <div class="card-body"></div>
                </div>
            </div>
        </div>
        <div class="toast position-fixed bottom-0 end-0 p-3" id="toastSucesso">
            <div class="toast-header">
                <strong class="me-auto">Sistema</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body">
                Prontuário salvo com sucesso!
            </div>
        </div>

    </form>
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
